global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Self-monitoring
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # Host metrics
  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  # Container metrics
  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  # Blackbox exporter self-metrics (detect exporter failures independently)
  - job_name: blackbox-exporter
    static_configs:
      - targets:
          - blackbox-exporter:9115

  # Website uptime & latency probes
  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          # Add client website URLs here
          - https://example.com
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # TLS certificate expiry checks
  # Only list HTTPS URLs here — the http_with_tls module has
  # fail_if_not_ssl: true, so plain HTTP targets will fail.
  - job_name: blackbox-tls
    metrics_path: /probe
    params:
      module: [http_with_tls]
    static_configs:
      - targets:
          # Add HTTPS-only client URLs here
          - https://example.com
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

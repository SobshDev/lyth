modules:
  http_2xx:
    prober: http
    timeout: 7s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: []  # defaults to 2xx
      method: GET
      follow_redirects: true
      preferred_ip_protocol: ip4
      ip_protocol_fallback: true

  http_with_tls:
    prober: http
    timeout: 7s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: []  # defaults to 2xx
      method: GET
      follow_redirects: true
      fail_if_not_ssl: true
      preferred_ip_protocol: ip4
      ip_protocol_fallback: true
      tls_config:
        insecure_skip_verify: false
        min_version: TLS12

  tcp_connect:
    prober: tcp
    timeout: 5s
    tcp:
      preferred_ip_protocol: ip4
      ip_protocol_fallback: true

  dns_lookup:
    prober: dns
    timeout: 5s
    dns:
      # PLACEHOLDER: replace with actual client domain or create per-client
      # dns modules (e.g. dns_lookup_clientname). The DNS prober uses target
      # as the DNS server address and query_name as the domain to resolve,
      # so query_name must be set per client — it cannot be templated.
      query_name: example.com
      query_type: A
      preferred_ip_protocol: ip4
      ip_protocol_fallback: true
      valid_rcodes:
        - NOERROR

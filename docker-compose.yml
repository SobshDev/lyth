networks:
  monitoring-internal:
    driver: bridge
  monitoring-public:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  uptime-kuma-data:

services:
  prometheus:
    build: ./docker/prometheus
    container_name: prometheus
    networks:
      - monitoring-internal
    volumes:
      - prometheus-data:/prometheus
    mem_limit: 1g
    cpus: 1.0
    restart: unless-stopped

  grafana:
    build: ./docker/grafana
    container_name: grafana
    networks:
      - monitoring-internal
      - monitoring-public
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    mem_limit: 512m
    cpus: 0.5
    restart: unless-stopped

  uptime-kuma:
    build: ./docker/uptime-kuma
    container_name: uptime-kuma
    networks:
      - monitoring-public
    volumes:
      - uptime-kuma-data:/app/data
    mem_limit: 512m
    cpus: 0.5
    restart: unless-stopped

  blackbox-exporter:
    build: ./docker/blackbox-exporter
    container_name: blackbox-exporter
    networks:
      - monitoring-internal
    mem_limit: 256m
    cpus: 0.25
    restart: unless-stopped

  node-exporter:
    build: ./docker/node-exporter
    container_name: node-exporter
    networks:
      - monitoring-internal
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
    mem_limit: 256m
    cpus: 0.25
    restart: unless-stopped

  cadvisor:
    build: ./docker/cadvisor
    container_name: cadvisor
    networks:
      - monitoring-internal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /:/rootfs:ro
    mem_limit: 256m
    cpus: 0.25
    restart: unless-stopped

  loki:
    build: ./docker/loki
    container_name: loki
    networks:
      - monitoring-internal
    volumes:
      - loki-data:/loki
    mem_limit: 1g
    cpus: 1.0
    restart: unless-stopped

  alloy:
    build: ./docker/alloy
    container_name: alloy
    networks:
      - monitoring-internal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    mem_limit: 512m
    cpus: 0.5
    restart: unless-stopped

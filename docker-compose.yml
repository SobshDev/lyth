networks:
  monitoring-internal:
    driver: bridge
  dokploy-network:
    external: true

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  uptime-kuma-data:

services:
  prometheus:
    build: ./docker/prometheus
    networks:
      - monitoring-internal
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    labels:
      - "traefik.enable=false"
    mem_limit: 1g
    cpus: 1.0
    restart: unless-stopped

  grafana:
    build: ./docker/grafana
    networks:
      - monitoring-internal
      - dokploy-network
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    labels:
      - "traefik.enable=true"
    mem_limit: 512m
    cpus: 0.5
    restart: unless-stopped

  uptime-kuma:
    build: ./docker/uptime-kuma
    networks:
      - dokploy-network
    volumes:
      - uptime-kuma-data:/app/data
    labels:
      - "traefik.enable=true"
    mem_limit: 512m
    cpus: 0.5
    restart: unless-stopped

  blackbox-exporter:
    build: ./docker/blackbox-exporter
    command: ["--config.file=/etc/blackbox_exporter/config.yml"]
    networks:
      - monitoring-internal
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    labels:
      - "traefik.enable=false"
    mem_limit: 256m
    cpus: 0.25
    restart: unless-stopped

  node-exporter:
    build: ./docker/node-exporter
    networks:
      - monitoring-internal
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
    labels:
      - "traefik.enable=false"
    mem_limit: 256m
    cpus: 0.25
    restart: unless-stopped

  cadvisor:
    build: ./docker/cadvisor
    networks:
      - monitoring-internal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /:/rootfs:ro
    labels:
      - "traefik.enable=false"
    mem_limit: 256m
    cpus: 0.25
    restart: unless-stopped

  loki:
    build: ./docker/loki
    networks:
      - monitoring-internal
    volumes:
      - loki-data:/loki
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
    labels:
      - "traefik.enable=false"
    mem_limit: 1g
    cpus: 1.0
    restart: unless-stopped

  alloy:
    build: ./docker/alloy
    command: ["run", "/etc/alloy/config.alloy", "--storage.path=/tmp/alloy"]
    networks:
      - monitoring-internal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
    labels:
      - "traefik.enable=false"
    mem_limit: 512m
    cpus: 0.5
    restart: unless-stopped

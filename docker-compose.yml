name: lyth

networks:
  monitoring-internal:
    driver: bridge
  dokploy-network:
    external: true

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  uptime-kuma-data:

services:
  prometheus:
    build: ./docker/prometheus
    networks:
      - monitoring-internal
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    labels:
      - "traefik.enable=false"
    mem_limit: 1g
    cpus: 1.0
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  grafana:
    build: ./docker/grafana
    networks:
      - monitoring-internal
      - dokploy-network
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:?Set GF_SECURITY_ADMIN_USER in .env}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?Set GF_SECURITY_ADMIN_PASSWORD in .env}
      - GF_SMTP_ENABLED=${GF_SMTP_ENABLED}
      - GF_SMTP_HOST=${GF_SMTP_HOST}
      - GF_SMTP_USER=${GF_SMTP_USER}
      - GF_SMTP_PASSWORD=${GF_SMTP_PASSWORD}
      - GF_SMTP_FROM_ADDRESS=${GF_SMTP_FROM_ADDRESS}
      - GF_SMTP_FROM_NAME=${GF_SMTP_FROM_NAME}
    labels:
      - "traefik.enable=true"
    mem_limit: 512m
    cpus: 0.5
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # SECURITY: cap_drop ALL removes CAP_NET_RAW — ICMP ping monitors will not work.
  # If ping monitoring is needed, add cap_add: [NET_RAW].
  # NOTE: read_only is not set — Uptime Kuma v2 needs write access to its working
  # directory for uploads, logs, and SQLite WAL files beyond the /app/data volume.
  uptime-kuma:
    build: ./docker/uptime-kuma
    networks:
      - dokploy-network
    volumes:
      - uptime-kuma-data:/app/data
    labels:
      - "traefik.enable=true"
    mem_limit: 512m
    cpus: 0.5
    restart: unless-stopped
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # SECURITY: cap_drop ALL removes CAP_NET_RAW — ICMP probe modules will not work.
  # If icmp probes are needed, add cap_add: [NET_RAW].
  blackbox-exporter:
    build: ./docker/blackbox-exporter
    command: ["--config.file=/etc/blackbox_exporter/config.yml"]
    networks:
      - monitoring-internal
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    labels:
      - "traefik.enable=false"
    mem_limit: 256m
    cpus: 0.25
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # SECURITY: node-exporter requires read-only host filesystem mounts (/proc, /sys, /)
  # for CPU, memory, disk, and network metrics. This grants broad host file visibility.
  # Mitigated by: read-only mounts, internal-only network, no-new-privileges, dropped caps.
  node-exporter:
    build: ./docker/node-exporter
    networks:
      - monitoring-internal
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
    labels:
      - "traefik.enable=false"
    mem_limit: 256m
    cpus: 0.25
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # SECURITY: cAdvisor requires Docker socket and host mounts (/sys, /var/lib/docker,
  # /sys/fs/cgroup, /) for container metrics. The Docker socket grants full Docker API
  # access — :ro only prevents file-level writes to the mount, NOT socket operations.
  # A compromised cAdvisor container could inspect secrets, launch containers, or
  # escalate to host. Mitigated by: internal-only network, no-new-privileges, dropped
  # caps, read-only rootfs. Accept this trade-off or remove cAdvisor.
  cadvisor:
    build: ./docker/cadvisor
    networks:
      - monitoring-internal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /:/rootfs:ro
    labels:
      - "traefik.enable=false"
    mem_limit: 256m
    cpus: 0.25
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  loki:
    build: ./docker/loki
    networks:
      - monitoring-internal
    volumes:
      - loki-data:/loki
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
    labels:
      - "traefik.enable=false"
    mem_limit: 1g
    cpus: 1.0
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # SECURITY: Alloy requires Docker socket for container discovery and log collection.
  # The Docker socket grants full Docker API access — :ro only prevents file-level
  # writes to the mount, NOT socket operations. A compromised Alloy container could
  # inspect secrets, launch containers, or escalate to host. Mitigated by: internal-only
  # network, no-new-privileges, dropped caps, read-only rootfs.
  alloy:
    build: ./docker/alloy
    command: ["run", "/etc/alloy/config.alloy", "--storage.path=/tmp/alloy"]
    networks:
      - monitoring-internal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
    labels:
      - "traefik.enable=false"
    mem_limit: 512m
    cpus: 0.5
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
